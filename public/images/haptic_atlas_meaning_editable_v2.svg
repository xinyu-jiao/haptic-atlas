<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="220" viewBox="0 0 1400 220">
  <rect x="1" y="1" width="1398" height="218" rx="18" fill="#F8F7F9" stroke="#D7D1DA" stroke-width="2"/>
  <text x="40" y="48" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#7D7A82" letter-spacing="1.5">MEANING</text>

  <!-- 1: Dot matrix -->
  <g transform="translate(150,92)">
    <circle cx="0" cy="0" r="10" fill="#CBB3E7"/>
    <circle cx="28" cy="0" r="10" fill="#B99ADA"/>
    <circle cx="0" cy="28" r="10" fill="#D8C4EE"/>
    <circle cx="28" cy="28" r="10" fill="#C6ACE3"/>
  </g>
  <text x="220" y="114" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#1C1823" letter-spacing="0.5">DOT MATRIX</text>
  <text x="220" y="150" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1C1823">Motor array /</text>
  <text x="220" y="184" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1C1823">Haptic feedback</text>

  <!-- 2: Direction — V chevron (same as main mark), not the legacy filled shape from earlier exports -->
  <g transform="translate(556, 72)">
    <path
      d="M0 0 L32 32 L0 64"
      fill="none"
      stroke="#A784DE"
      stroke-width="5.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
  <text x="660" y="114" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#1C1823" letter-spacing="0.5">DIRECTION</text>
  <text x="660" y="150" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1C1823">Guidance /</text>
  <text x="660" y="184" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1C1823">Navigation</text>

  <!-- 3: Circle -->
  <g transform="translate(980,106)">
    <circle cx="0" cy="0" r="34" fill="none" stroke="#C4A4E2" stroke-width="8"/>
  </g>
  <text x="1060" y="114" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#1C1823" letter-spacing="0.5">CIRCLE</text>
  <text x="1060" y="150" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1C1823">The body /</text>
  <text x="1060" y="184" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1C1823">Wearable</text>

  <!-- 4: Waves -->
  <g transform="translate(1260,108)" stroke="#A883D2" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M0 -18 C8 -10 8 10 0 18"/>
    <path d="M18 -32 C31 -18 31 18 18 32"/>
    <path d="M40 -46 C59 -26 59 26 40 46"/>
  </g>
  <text x="1320" y="114" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#1C1823" letter-spacing="0.5">WAVES</text>
  <text x="1320" y="150" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1C1823">Vibration /</text>
  <text x="1320" y="184" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1C1823">Signal</text>
</svg>
